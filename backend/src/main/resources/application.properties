# Server configuration
server.port=8080

# Database Configuration (H2 File-Based - persistent)
spring.datasource.url=jdbc:h2:file:./data/budgetwisedb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# Secret key must be at least 256 bits long (32 bytes)
budgetwise.jwt.secret=BudgetWisePersonalFinanceManagementSecretKeyJWTAuthentication2026SecureString!
budgetwise.jwt.expirationMs=86400000
